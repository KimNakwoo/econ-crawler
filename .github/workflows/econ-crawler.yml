name: 경제지표 자동 크롤러

on:
  schedule:
    # ── 크롤링: BLS 지표 발표 직후 ──────────────────────────
    # 서머타임(EDT): UTC 12:31 = 한국시간 오후 9:31
    - cron: '31 12 * * 1-5'
    # 겨울타임(EST): UTC 13:31 = 한국시간 오후 10:31
    - cron: '31 13 * * 1-5'

    # ── 크롤링: FOMC / 베이지북 발표 직후 ───────────────────
    # 서머타임(EDT): UTC 18:31 = 한국시간 새벽 3:31
    - cron: '31 18 * * 1-5'
    # 겨울타임(EST): UTC 19:31 = 한국시간 새벽 4:31
    - cron: '31 19 * * 1-5'

    # ── 알림: 일요일 오전 9시 (이번 주 일정 예고) ───────────
    # UTC 00:00 일요일 = 한국시간 오전 9:00 일요일
    - cron: '0 0 * * 0'

    # ── 알림: 금요일 오후 3:30 (다음 주 일정 예고) ──────────
    # UTC 06:30 금요일 = 한국시간 오후 3:30 금요일
    - cron: '30 6 * * 5'

    # ── 알림: 평일 오전 8시 (당일 발표 예정 + 말일 평일이면 다음달 예고) ─
    # UTC 23:00 (전날) = 한국시간 오전 8:00
    - cron: '0 23 * * 0-4'

    # ── 알림: 평일 오전 9시 (말일 공휴일이면 다음달 예고) ───
    # UTC 00:00 평일 = 한국시간 오전 9:00
    - cron: '0 0 * * 1-5'

  workflow_dispatch:

jobs:
  # ── Job 1: 경제지표 크롤링 ──────────────────────────────────
  crawl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: output 폴더 초기화
        run: |
          mkdir -p output/CPI output/PPI output/비농업고용 output/베이지북 \
                   "output/연준/성명서" "output/연준/기자회견" \
                   "output/연준/의사록" "output/연준/의장연설" "output/연준/FEDS_Notes"

      - name: 경제지표 크롤링
        run: python run_all.py

      - name: 결과 저장
        id: save
        run: |
          git config user.name "econ-crawler[bot]"
          git config user.email "econ-crawler[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "오늘 발표 지표 없음 - 커밋 스킵"
            echo "CRAWLED=false" >> $GITHUB_ENV
          else
            git commit -m "📊 경제지표 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
            echo "CRAWLED=true" >> $GITHUB_ENV
          fi

      - name: 텔레그램 알림 (크롤링 완료)
        if: env.CRAWLED == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CRAWL_CHAT_ID }}
        run: |
          if [ -f output/.last_run.txt ]; then
            RUN_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            INDICATORS=$(grep -v "^TIME=" output/.last_run.txt | grep -v "=스킵" | sed 's/=/ /' | awk '{print "  • "$1" "$2}' | tr '\n' '\n')
            MESSAGE="📊 <b>경제지표 크롤링 완료</b>%0A%0A🕐 ${RUN_TIME}%0A%0A${INDICATORS}%0A%0AObsidian을 확인하세요."
          else
            RUN_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            MESSAGE="📊 <b>경제지표 크롤링 완료</b>%0A🕐 ${RUN_TIME}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CRAWL_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=${MESSAGE}"

      - name: 텔레그램 에러 알림
        if: failure()
        run: |
          RUN_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CRAWL_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=⚠️ <b>크롤링 실패</b>%0A🕐 ${RUN_TIME}%0A%0AGitHub Actions 로그를 확인하세요."

  # ── Job 2: 일정 알림 ────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_SCHEDULE_CHAT_ID }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml holidays

      - name: 주간 예고 알림 (일요일 9시 = 이번 주 / 금요일 3:30 = 다음 주)
        if: ${{ github.event.schedule == '0 0 * * 0' || github.event.schedule == '30 6 * * 5' }}
        run: NOTIFY_MODE=weekly python notifier.py

      - name: 평일 당일 알림 (오전 8시, 말일 평일이면 다음달 예고 포함 / 수동 실행 포함)
        if: ${{ github.event.schedule == '0 23 * * 0-4' || github.event_name == 'workflow_dispatch' }}
        run: NOTIFY_MODE=daily python notifier.py

      - name: 평일 9시 알림 (말일 공휴일인 경우에만 다음달 예고 전송)
        if: github.event.schedule == '0 0 * * 1-5'
        run: NOTIFY_MODE=daily_late python notifier.py
