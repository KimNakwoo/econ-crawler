name: 경제지표 자동 크롤러

on:
  schedule:
    # ── 크롤링: BLS 지표 발표 직후 ──────────────────────────
    # 서머타임(EDT): UTC 12:31 = 한국시간 오후 9:31
    - cron: '31 12 * * 1-5'
    # 겨울타임(EST): UTC 13:31 = 한국시간 오후 10:31
    - cron: '31 13 * * 1-5'

    # ── 크롤링: FOMC / 베이지북 발표 직후 ───────────────────
    # 서머타임(EDT): UTC 18:31 = 한국시간 새벽 3:31
    - cron: '31 18 * * 1-5'
    # 겨울타임(EST): UTC 19:31 = 한국시간 새벽 4:31
    - cron: '31 19 * * 1-5'

    # ── 매일 체크: FOMC의사록/연준연설/FEDS_Notes (한국시간 자정 00:00) ─
    # (알림 4종은 notify.yml로 분리 - 크롤링 작업과 스케줄 독립)
    # UTC 15:00 = 한국시간 자정 00:00 (서머타임 영향 없음)
    # ※ 05:00 → 00:00으로 앞당김: 플랫폼 지연 3시간 발생해도 03:00 종료,
    #   08:00/09:00 알림 시간과 충돌 원천 차단
    - cron: '0 15 * * 0-4'

  workflow_dispatch:
    inputs:
      force_indicators:
        description: '강제 실행 지표 (예: cpi,ppi,nfp,fomc,beige) — 미입력 시 오늘 날짜 자동 감지'
        required: false
        default: ''

jobs:
  # ── Job 1: 경제지표 크롤링 ──────────────────────────────────
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 최대 4시간 (자정 시작 + 플랫폼 지연 3시간 감안 → 07:00 전 종료 보장)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CRON_SCHEDULE: ${{ github.event.schedule }}
      FORCE_INDICATORS: ${{ github.event.inputs.force_indicators }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: output 폴더 초기화
        run: |
          mkdir -p output/CPI output/PPI output/비농업고용 output/베이지북 \
                   "output/연준/성명서" "output/연준/기자회견" \
                   "output/연준/의사록" "output/연준/의장연설" "output/연준/FEDS_Notes"

      - name: 경제지표 크롤링
        run: python run_all.py

      - name: 결과 저장
        id: save
        run: |
          git config user.name "econ-crawler[bot]"
          git config user.email "econ-crawler[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "오늘 발표 지표 없음 - 커밋 스킵"
            echo "CRAWLED=false" >> $GITHUB_ENV
          else
            git commit -m "📊 경제지표 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
            echo "CRAWLED=true" >> $GITHUB_ENV
          fi

      - name: 텔레그램 알림 (크롤링 완료)
        if: env.CRAWLED == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CRAWL_CHAT_ID }}
        run: |
          if [ -f output/.last_run.txt ]; then
            RUN_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            INDICATORS=$(grep -v "^TIME=" output/.last_run.txt | grep -v "=스킵" | sed 's/=/ /' | awk '{print "  • "$1" "$2}' | tr '\n' '\n')
            MESSAGE="📊 <b>경제지표 크롤링 완료</b>%0A%0A🕐 ${RUN_TIME}%0A%0A${INDICATORS}%0A%0AObsidian을 확인하세요."
          else
            RUN_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            MESSAGE="📊 <b>경제지표 크롤링 완료</b>%0A🕐 ${RUN_TIME}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CRAWL_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=${MESSAGE}"

      - name: 텔레그램 에러 알림
        if: failure()
        run: |
          RUN_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CRAWL_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=⚠️ <b>크롤링 실패</b>%0A🕐 ${RUN_TIME}%0A%0AGitHub Actions 로그를 확인하세요."
